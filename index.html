<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Accelerator</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }
        /* 主界面 */
        #app-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px 60px 20px; /* 调整内边距，给顶部留出空间 */
            background: radial-gradient(circle at center, #141414 0%, #0a0a0a 100%);
            transition: opacity 0.1s ease;
            z-index: 10;
        }
        
        /* 🎬 网页伪装的【道具状态栏】 */
        .fake-status-bar {
            width: 100%;
            height: 36px; /* 契合大部分安卓挖孔屏或刘海屏的高度 */
            display: flex;
            justify-content: space-between; /* 左右两端对齐 */
            align-items: center;
            padding: 0 16px;
            background-color: transparent;
            z-index: 100;
        }
        /* 左侧假时间：由JavaScript控制，按住时会跟着疯狂加速！ */
        .fake-time {
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        /* 右侧留空（干掉了所有电量、信号和Wi-Fi图标，只留下一片干净的黑暗，完美避开穿帮） */
        .fake-icons {
            width: 40px;
            height: 10px;
        }

        .hint-text {
            color: #666;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 40px;
        }
        /* 核心圆形大按钮 */
        .btn-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
        }
        #accelerate-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: #111;
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 15px rgba(255,255,255,0.05);
            color: #aaa;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #app-screen.accelerating #accelerate-btn {
            background: #1a1a1a;
            border-color: #00ffcc;
            color: #00ffcc;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.3), inset 0 0 20px rgba(0, 255, 204, 0.1);
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(0, 255, 204, 0.2); }
            100% { transform: scale(1.03); box-shadow: 0 0 50px rgba(0, 255, 204, 0.5); }
        }
        /* 没电黑屏界面 */
        #dead-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .battery-icon {
            width: 70px;
            height: 35px;
            border: 3px solid #ff3b30;
            border-radius: 6px;
            position: relative;
            padding: 3px;
        }
        .battery-icon::after {
            content: '';
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 7px;
            height: 14px;
            background-color: #ff3b30;
            border-radius: 0 3px 3px 0;
        }
        .battery-level {
            width: 15%;
            height: 100%;
            background-color: #ff3b30;
            border-radius: 2px;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="app-screen">
        <div class="fake-status-bar">
            <div class="fake-time" id="display-time">06:34</div> <div class="fake-icons"></div> </div>
        
        <div class="hint-text">System Ready</div>
        <div class="btn-container">
            <div id="accelerate-btn">ACCELERATE</div>
        </div>
        <div class="hint-text" style="font-size: 11px; color: #444; margin-top: 0; margin-bottom: 20px;">v1.0.4-build.88</div>
    </div>

    <div id="dead-screen">
        <div class="battery-icon">
            <div class="battery-level"></div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('accelerate-btn');
        const appScreen = document.getElementById('app-screen');
        const deadScreen = document.getElementById('dead-screen');
        const timeDisplay = document.getElementById('display-time');
        
        let isDead = false;
        let pressTimer = null;
        let timeInterval = null;
        
        // 模拟剧本中的初始时间：早晨 06:34
        let currentHour = 6;
        let currentMinute = 34;

        function updateTimeDisplay() {
            let h = currentHour < 10 ? '0' + currentHour : currentHour;
            let m = currentMinute < 10 ? '0' + currentMinute : currentMinute;
            timeDisplay.textContent = `${h}:${m}`;
        }

        // 双击屏幕上方重置
        appScreen.addEventListener('dblclick', (e) => {
            if(e.clientY < 100) resetApp();
        });
        deadScreen.addEventListener('click', () => {
            resetApp();
        });

        function resetApp() {
            isDead = false;
            deadScreen.style.display = 'none';
            appScreen.style.opacity = '1';
            appScreen.classList.remove('accelerating');
            currentHour = 6;
            currentMinute = 34;
            updateTimeDisplay();
            clearTimeout(pressTimer);
            clearInterval(timeInterval);
        }

        // 开始加速：时间数字开始疯狂跳动！
        function startAccelerate(e) {
            e.preventDefault();
            if (isDead) return;
            
            appScreen.classList.add('accelerating');
            
            // 拍高潮戏时，时间数字每 20 毫秒就会疯狂加几分钟，在大银幕特写里视觉效果极震撼
            timeInterval = setInterval(() => {
                currentMinute += Math.floor(Math.random() * 5) + 2; // 随机快进
                if (currentMinute >= 60) {
                    currentHour += 1;
                    currentMinute = currentMinute % 60;
                }
                if (currentHour >= 24) {
                    currentHour = 0;
                }
                updateTimeDisplay();
            }, 20);
            
            // 6秒后准时没电
            pressTimer = setTimeout(() => {
                triggerBatteryDead();
            }, 6000); 
        }

        function stopAccelerate() {
            if (isDead) return;
            appScreen.classList.remove('accelerating');
            clearTimeout(pressTimer);
            clearInterval(timeInterval);
        }

        function triggerBatteryDead() {
            isDead = true;
            appScreen.classList.remove('accelerating');
            clearInterval(timeInterval);
            
            // 强行把时间卡在剧本高潮过后的晚上（例如21:45），随后黑屏
            currentHour = 21;
            currentMinute = 45;
            updateTimeDisplay();
            
            appScreen.style.opacity = '0';
            
            setTimeout(() => {
                deadScreen.style.display = 'flex';
                setTimeout(() => {
                    deadScreen.innerHTML = ''; 
                    deadScreen.style.backgroundColor = '#000';
                }, 3000);
            }, 500);
        }

        btn.addEventListener('touchstart', startAccelerate, { passive: false });
        btn.addEventListener('touchend', stopAccelerate);
        btn.addEventListener('touchcancel', stopAccelerate);
        btn.addEventListener('mousedown', startAccelerate);
        btn.addEventListener('mouseup', stopAccelerate);
        btn.addEventListener('mouseleave', stopAccelerate);
        
        // 初始初始化
        updateTimeDisplay();
    </script>
</body>
</html>
